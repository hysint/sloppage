<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sloppage</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" href="assets/icons/icon.png" type="image/icon type" />
    <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js"></script>
  </head>

  <body data-theme="dark">
    <div class="container">
      <header>
        <div class="avatar" id="avatar"></div>

        <div class="header-right">
          <div class="upper-profile">
            <div class="profile">
              <div class="name">
                <h1 id="name"></h1>
                <p id="title"></p>
                <p id="location"></p>
              </div>
            </div>
            <div class="controls">
              <button
                class="btn secondary"
                id="themeToggle"
                title="Toggle theme"
                aria-label="Toggle theme"
              >
                <iconify-icon
                  id="themeIcon"
                  icon="material-symbols:dark-mode-rounded"
                ></iconify-icon>
              </button>
            </div>
          </div>

          <div class="lower-profile">
            <div class="badges" id="skills"></div>
            <div class="badges" id="tools"></div>
          </div>
        </div>
      </header>

      <aside class="sidebar">
        <div class="card about">
          <div class="section-title">About Me</div>
          <p id="summary"></p>
          <div class="section-title">Contact</div>
          <div class="contact">
            <a id="email"></a>
            <a id="phone"></a>
          </div>
        </div>

        <div class="card">
          <div class="section-title">Socials</div>
          <div class="socials" id="socials"></div>
        </div>
        <div class="logo" id="logo"></div>
      </aside>

      <main class="content">
        <div class="card">
          <div class="section-head">
            <div class="section-title">Experience</div>
          </div>
          <div id="experience" class="list"></div>
        </div>

        <div class="card">
          <div class="section-head">
            <div class="section-title">Education</div>
          </div>
          <div id="education" class="list"></div>
        </div>

        <div class="card">
          <div class="section-head">
            <div class="section-title">Projects</div>
          </div>
          <div class="list" id="projects"></div>
        </div>
      </main>
    </div>

    <footer class="footer-content">
      <p id="note"></p>
    </footer>

    <script src="js/app.js"></script>
  </body>
</html>
